<!doctype html>
<!-- Declara el tipo de documento. Indica al navegador que se está usando HTML5.
     Es importante para que el navegador interprete correctamente el código. -->

<html lang="en">
  <!-- Es la etiqueta raíz de todo el documento HTML.
     El atributo "lang" define el idioma del contenido (en este caso, inglés).
     Esto ayuda a buscadores y accesibilidad (lectores de pantalla). -->

  <head>
    <!-- Contiene metadatos, es decir, información sobre la página que NO se muestra directamente.
     Aquí se configuran cosas como el título, codificación, estilos, etc. -->

    <a href="/practica8.html">ir a practica 2 </a>

    <meta charset="UTF-8" />
    <!-- Define la codificación de caracteres como UTF-8.
         Permite usar correctamente acentos, ñ, símbolos, etc. -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Hace que la página sea responsive (adaptable a móviles).
         "width=device-width" ajusta el ancho al dispositivo.
         "initial-scale=1.0" define el nivel de zoom inicial. -->

    <title>Document</title>
    <!-- Define el título de la página.
         Este aparece en la pestaña del navegador. -->
  </head>

  <body>
    <!-- Contiene todo el contenido visible de la página web:
     textos, imágenes, botones, enlaces, etc. -->
  </body>
  <!-- Cierre del cuerpo del documento -->
</html>
<!-- Cierre de la etiqueta raíz -->
