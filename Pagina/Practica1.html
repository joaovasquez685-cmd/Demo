<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>parrafos y encabezados</title>
</head>
<body>
<!--- titutlos o encabezados:
se tiene 6 tipos de encabezados , desde el h1 hasta el h6. -->
<!--- (h$*6) crea 6 titulo en orden del 1 al 6 -->
    <h1>titulo</h1>
    <!---el h1 se utiliza una sola vez por pagina web esto es debido a que el h1 tiene una importancia en el CEO lo que es el posicionamiento web , es decir , google le da mucha importancia al h1-->
    <h2></h2>
    <h3></h3>
    <h4></h4>
    <h5></h5>
    <h6></h6>
    <!--- desde el h2 hasta el h6 , se pueden utilizar las veces que sean necesarias segun el contenido que se quiera recrear-->

    <!--- parrafo:los parrafos deben tener una idea o punto especifico.
    cada parrafo escrito debe de contener un concepto , una idea. es decir , puede edescribir una seccion o un elemento, hasta un mensaje en el chat. por ejemplo en una seccion se habla sobre los beneficios del ejercicio : un parrafo puede tratar de mejorar la salud cardiovascular y  otro puede ser sobre los beneficios y cuidados de la salud mental. finalmente , debe existir un motivo para que exista un parrafo-->

    <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Sequi maiores eum rem aliquid voluptatum a minus soluta ducimus dolores distinctio magni vitae et accusamus quos maxime aspernatur, id iusto! Dolorum.</p>
    <!--(control+shift+p) o (alt+z) ajusta el contenido del parrafo a la ventana del editor -->
    <!-- existen algunas tecnologias de asistencia como lectores de pantalla , que ayudan a las personas con discapacidad visual a navegar por el contenido web.
    por ejemplo : cuando estas tecnologias leen el h1 de la pagina , entienden de que trata la pagina por el h1. por temas de accesibilidad web es importante que se utilice solo un h1 por pagina. -->
</body>
</html>
