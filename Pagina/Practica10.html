<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rutas</title>
</head>
<body>
    
    <h1>explicacion : rutas absolutas y relativas</h1>

        <section>
            <h2>rutas absolutas</h2>
            <!--- ruta completa a un recurso en un servidor externo . la ruta absoluta es una url completa del recruso , esta no se modifica segun la ubicacion del archivo actual-->
            <p>
                para ir a un sitio externo , como el catalogo global de repuestos, usamos la url completa
                <a href="https://www.shimano.com">visitar shimano internacional</a>
            </p>

            <img src="https://www.manualweb.net/img/covers/html5-cover.jpg" alt="imagen HTML desde un servidor externo" width="300" height="200"    title="HTML 5">
        </section>
            
            <hr>

            <section>
                <h2>rutas relativas</h2>
                    <!-- ruta relativa a un recurso dentro del mismo proyecto. la ruta relativa se basa en la ubicacion del archivo actual , y se ajusta segun la estructura de carpetas del proyecto -->

                <p>
                    ir a la pagina de <a href="04_inline_inblock.html">inline vs block</a>
                    <!-- funciona si hay un archivo llamado "04_inline_inblock.html" en la misma carpeta-->
                </p>
                
                <p>
                    ver foto de tecnologia <a href="/img/imagen_css.png">CSS 3</a>
                    <!-- funciona si hay una imagen llamada " imagen_css.png" en la carpeta llamada "img"-->
                </p>
            </section>
        </body>
        </html>
