<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>enlaces</title>
</head>
<body>
    <!-- los enlaces o anclas o hipervinculos-->
    <!-- a (anchor) significa ancla . metafora: como en un barco te mantiene en una ubicacion especifica un ancla es justamente para que el usuario sepa hacia donde buscar un recurso o hacia donde navegar en la pagina web-->

    <!-- los atributos son caracteristicas que definen el comportamiento y la apariencia de los elementos en este caso el atributo href vuelve funcional a la etiqueta es por esta razon que se utiliza en el maquetado y no en el css dado que no es una caracteristica visual-->
    
    <!-- href ( hyper reference) es la referencia a un recurso , es decir , el destino del enlace-->
    <!-- lo que esta dentro de la etiqueta a es el texto visible que el usuario vera en la pagina wen . mientras que lo que esta dentro de href es la referencia al recurso al que apunta el enlace-->
    <h2 title="titulo de pagina">enlaces o anclas</h2>
    <!-- por otra parte , el atributo title proporciona un texto de ayuda que se muestra cuando el usuario para el mouse sobre el enlace . las tecnologias de asistencia como lecotres de pantalla utilizan este atributo para proporcionar informacion adicional al usuario. en el caso de personas invidentes esto les permite acceder a informacion adicional sobre el enlace-->

    <a href="https://www.google.com">Google </a>
    <a href="https://www.facebook.com">facebook</a>
    <a href="https://www.youtube.com">youtube</a>
    <a title="ir al canal de youtube" href="//youtube.com/ramcrack0584">ramcrack</a> <!-- mala practica : ussar protocolo relativo sin especificar el protocolo-->
    <br>
    <br>
    <a href="03-01_pagina_enlace.html">ir a enlace uno</a>
    <br>
    <a href="03-02_pagina_enlace.html">ir a enlace dos</a>
    <br>
    <a href="03-03_pagina_enlace.html">ir a enlace tres</a>
    <!--es sumamente importante que en la programacion y el desarrollo web se realicen las practicas a medida que se va avanzando , de esta forma se asegura una mejor comprension y aplicacion de los conceptos aprendidos. entiendan que la programacion es un proceso activo no pasivo , una cosa es intentar comprender lo que sucede cuando leen o ven algo que se esta haciendo , sin embargo , la unica forma de aprender es probando ustedes mismos todo lo que se debe implementar-->
    <br>

    <h2>enlaces con target a otra venta</h2>
    <a href="03-4_pagina_enlace4.html" target="_blank">ir a enlace cuatro en nueva ventana</a>
    <!--- el atributo target="blank" abre el enlace en una nueva ventana o pestaña del navegador. por defecto siempre esta en self que significa que se abre en la misma ventana-->
</body>
</html>
