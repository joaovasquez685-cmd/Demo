    <!-- las imagenes  se insertan en html utilizando la etiqueta img. esta etiqueta es un elemento vacio , lo que significa que no tiene una etiqueta de cierre. la sintaxis basica para insertar una imagen es :-->
    <img src="/04_imagen.png" alt="lgotipo de HTML5" title="HTML5" width="200" height="200">
    <!--para que los lectores de pantalla puedan saber de que se trata la imagen el atributo alt ( alternative text ) es muy importante puesto que proporciona una descripcion textual de la imagen para accesibilidad y como fallback si no se carga. el texto alternativo debe ser descriptivo y conciso , y debe transmitir la informacion esencial que la imagen representa. por ejemplo , si la iamgen es un logotipo de una empresa , el texto alternativo podria ser "logotipo de la empresa XYZ". si la imagen es una fotografia de un paisaje , el texto alternativo podria ser " fotografia de un paisaje con montañas y un lago". en resumen , el atributo alt proporciona una descripcion de la imagen en caos de que no se pueda cargar-->

    <!-- self closing tags son etiquetas que se autocierran-->
