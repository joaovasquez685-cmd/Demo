<!doctype html>
<!-- Indica que el documento está escrito en HTML5 -->

<html lang="en">
  <!-- Etiqueta principal que envuelve todo el contenido.
     "lang=en" indica que el idioma es inglés -->

  <head>
    <!-- Contiene información interna (no visible) de la página -->

    <meta charset="UTF-8" />
    <!-- Define la codificación de caracteres (permite usar acentos, símbolos, etc.) -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Permite que la página se adapte a dispositivos móviles (responsive) -->

    <title>Document</title>
    <!-- Título que aparece en la pestaña del navegador -->
  </head>

  <body>
    <!-- Contiene todo lo visible en la página web -->

    <h1>titulo principal o de primer orden</h1>
    <!-- Encabezado de nivel 1: es el más importante (título principal de la página) -->

    <h2>titulo de segundo orden</h2>
    <!-- Encabezado de nivel 2: subtítulo, menor importancia que h1 -->

    <h3>tituño de tercer orden</h3>
    <!-- Encabezado de nivel 3: se usa para subdividir contenido -->

    <h4>titulo de cuarto orden</h4>
    <!-- Encabezado de nivel 4: menor jerarquía -->

    <h5>titulo de quinto orden</h5>
    <!-- Encabezado de nivel 5: poco uso, para niveles más específicos -->

    <h6>titulo de sexto orden</h6>
    <!-- Encabezado de nivel 6: el de menor importancia -->
  </body>
  <!-- Fin del contenido visible -->
</html>
<!-- Fin del documento HTML -->
